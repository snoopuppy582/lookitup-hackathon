    <text x="408" y="316" font-size="30" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="408" dy="0">Evidence</tspan><tspan x="408" dy="35.4">Cards</tspan></text>
    <text x="408" y="407.4" font-size="22" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="408" dy="0">Source quotes</tspan><tspan x="408" dy="27.5">stay visible</tspan><tspan x="408" dy="27.5">beside the</tspan><tspan x="408" dy="27.5">claim.</tspan></text>
  
      
