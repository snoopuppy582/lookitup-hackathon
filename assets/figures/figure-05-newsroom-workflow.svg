    <text x="118" y="316" font-size="30" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="118" dy="0">Draft Claim</tspan></text>
    <text x="118" y="407.4" font-size="22" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="118" dy="0">A doubtful</tspan><tspan x="118" dy="27.5">sentence is</tspan><tspan x="118" dy="27.5">attached to the</tspan><tspan x="118" dy="27.5">article draft.</tspan></text>
  
      
