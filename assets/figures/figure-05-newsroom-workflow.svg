    <text x="698" y="407.4" font-size="22" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="698" dy="0">Summary uses</tspan><tspan x="698" dy="27.5">only retrieved</tspan><tspan x="698" dy="27.5">Evidence Cards.</tspan></text>
  
      
    <rect x="960" y="260" width="250" height="260" rx="18" fill="#ffffff" stroke="#d8dee8" filter="url(#shadow)" />
