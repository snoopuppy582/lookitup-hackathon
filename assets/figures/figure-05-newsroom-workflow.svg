    <text x="988" y="407.4" font-size="22" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="988" dy="0">Desk approval</tspan><tspan x="988" dy="27.5">happens with</tspan><tspan x="988" dy="27.5">evidence</tspan><tspan x="988" dy="27.5">attached.</tspan></text>
  
      
