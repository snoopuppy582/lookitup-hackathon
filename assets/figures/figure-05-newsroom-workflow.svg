    <text x="1278" y="407.4" font-size="22" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="1278" dy="0">The source trail</tspan><tspan x="1278" dy="27.5">can be saved</tspan><tspan x="1278" dy="27.5">after</tspan><tspan x="1278" dy="27.5">publication.</tspan></text>
  
