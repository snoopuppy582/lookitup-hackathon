<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0d1117" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1557ff" />
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#f4f6f8" />
  <rect x="54" y="42" width="1492" height="88" rx="18" fill="#ffffff" stroke="#d8dee8" />
  <text x="86" y="82" font-size="18" font-weight="900" fill="#1557ff" font-family="Arial, Helvetica, sans-serif">LOOKITUP FIGURE 01</text>
  <text x="86" y="111" font-size="28" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif">Fake visual becomes news</text>
  <text x="1040" y="95" font-size="20" font-weight="800" fill="#5b6472" font-family="Arial, Helvetica, sans-serif">Problem case</text>
  
      
    <rect x="90" y="230" width="300" height="300" rx="18" fill="#ffffff" stroke="#d8dee8" filter="url(#shadow)" />
    <rect x="90" y="230" width="8" height="300" rx="4" fill="#d92d20" />
    <text x="118" y="286" font-size="30" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="118" dy="0">Social post</tspan></text>
    <text x="118" y="377.4" font-size="22" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="118" dy="0">AI-generated snow</tspan><tspan x="118" dy="27.5">visual spreads</tspan><tspan x="118" dy="27.5">online.</tspan></text>
  
      
    <rect x="450" y="230" width="300" height="300" rx="18" fill="#ffffff" stroke="#d8dee8" filter="url(#shadow)" />
    <rect x="450" y="230" width="8" height="300" rx="4" fill="#b7791f" />
    <text x="478" y="286" font-size="30" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="478" dy="0">Korean media</tspan></text>
    <text x="478" y="377.4" font-size="22" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="478" dy="0">Public news repeats</tspan><tspan x="478" dy="27.5">the visual claim</tspan><tspan x="478" dy="27.5">before source</tspan><tspan x="478" dy="27.5">evidence.</tspan></text>
  
      
    <rect x="810" y="230" width="300" height="300" rx="18" fill="#ffffff" stroke="#d8dee8" filter="url(#shadow)" />
    <rect x="810" y="230" width="8" height="300" rx="4" fill="#1557ff" />
    <text x="838" y="286" font-size="30" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="838" dy="0">Fact-check</tspan><tspan x="838" dy="35.4">correction</tspan></text>
    <text x="838" y="377.4" font-size="22" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="838" dy="0">OhmyNews and AFP</tspan><tspan x="838" dy="27.5">identify the visual</tspan><tspan x="838" dy="27.5">as AI-generated.</tspan></text>
  
      
    <rect x="1170" y="230" width="300" height="300" rx="18" fill="#ffffff" stroke="#d8dee8" filter="url(#shadow)" />
    <rect x="1170" y="230" width="8" height="300" rx="4" fill="#067647" />
    <text x="1198" y="286" font-size="30" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="1198" dy="0">Before</tspan><tspan x="1198" dy="35.4">publication</tspan></text>
    <text x="1198" y="377.4" font-size="22" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="1198" dy="0">Lookitup brings</tspan><tspan x="1198" dy="27.5">source-bound</tspan><tspan x="1198" dy="27.5">Evidence Cards</tspan><tspan x="1198" dy="27.5">before publishing.</tspan></text>
  
      <line x1="402" y1="380" x2="438" y2="380" stroke="#1557ff" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" />
      <line x1="762" y1="380" x2="798" y2="380" stroke="#1557ff" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" />
      <line x1="1122" y1="380" x2="1158" y2="380" stroke="#1557ff" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" />
      <rect x="140" y="610" width="1320" height="138" rx="18" fill="#fff1f0" stroke="#ffd4d1" />
      <text x="178" y="660" font-size="34" font-weight="900" fill="#d92d20" font-family="Arial, Helvetica, sans-serif"><tspan x="178" dy="0">Publication-before-evidence failure</tspan></text>
      <text x="178" y="715" font-size="24" font-weight="800" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="178" dy="0">The newsroom sees the claim after it has already moved across platforms, languages,</tspan><tspan x="178" dy="28.32">and outlets.</tspan></text>
    
</svg>