    <text x="498" y="397.4" font-size="24" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="498" dy="0">Kamchatka snow</tspan><tspan x="498" dy="30">reached the height</tspan><tspan x="498" dy="30">of a 10-story</tspan><tspan x="498" dy="30">apartment</tspan><tspan x="498" dy="30">building.</tspan></text>
  
      
