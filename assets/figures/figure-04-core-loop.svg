    <text x="858" y="397.4" font-size="24" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="858" dy="0">Quote, source,</tspan><tspan x="858" dy="30">date, URL, ranking</tspan><tspan x="858" dy="30">score.</tspan></text>
  
      
