    <text x="138" y="306" font-size="30" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="138" dy="0">1. Select</tspan><tspan x="138" dy="35.4">Source Pack</tspan></text>
    <text x="138" y="397.4" font-size="24" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="138" dy="0">Breaking News +</tspan><tspan x="138" dy="30">Fact-Check Pack</tspan></text>
  
      
