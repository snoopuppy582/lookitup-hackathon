    <text x="1218" y="397.4" font-size="24" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="1218" dy="0">Hold, rewrite, or</tspan><tspan x="1218" dy="30">continue</tspan><tspan x="1218" dy="30">reporting.</tspan></text>
  
