<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0d1117" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1557ff" />
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#f4f6f8" />
  <rect x="54" y="42" width="1492" height="88" rx="18" fill="#ffffff" stroke="#d8dee8" />
  <text x="86" y="82" font-size="18" font-weight="900" fill="#1557ff" font-family="Arial, Helvetica, sans-serif">LOOKITUP FIGURE 02</text>
  <text x="86" y="111" font-size="28" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif">The deadline is five minutes. The standard is 100%.</text>
  <text x="1040" y="95" font-size="20" font-weight="800" fill="#5b6472" font-family="Arial, Helvetica, sans-serif">Helena Pilar Gisbert, AFP</text>
  
      
    <rect x="90" y="250" width="320" height="300" rx="18" fill="#ffffff" stroke="#d8dee8" filter="url(#shadow)" />
    <rect x="90" y="250" width="8" height="300" rx="4" fill="#d92d20" />
    <text x="118" y="306" font-size="30" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="118" dy="0">maximum five</tspan><tspan x="118" dy="35.4">minutes</tspan></text>
    <text x="118" y="397.4" font-size="26" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="118" dy="0">Breaking-news</tspan><tspan x="118" dy="32.5">alerts move in</tspan><tspan x="118" dy="32.5">minutes.</tspan></text>
  
      
    <rect x="455" y="250" width="320" height="300" rx="18" fill="#ffffff" stroke="#d8dee8" filter="url(#shadow)" />
    <rect x="455" y="250" width="8" height="300" rx="4" fill="#b7791f" />
    <text x="483" y="306" font-size="30" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="483" dy="0">15 minutes</tspan></text>
    <text x="483" y="397.4" font-size="26" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="483" dy="0">An article may</tspan><tspan x="483" dy="32.5">follow almost</tspan><tspan x="483" dy="32.5">immediately.</tspan></text>
  
      
    <rect x="820" y="250" width="320" height="300" rx="18" fill="#ffffff" stroke="#d8dee8" filter="url(#shadow)" />
    <rect x="820" y="250" width="8" height="300" rx="4" fill="#1557ff" />
    <text x="848" y="306" font-size="30" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="848" dy="0">100% correct</tspan></text>
    <text x="848" y="397.4" font-size="26" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="848" dy="0">Agency copy must</tspan><tspan x="848" dy="32.5">be truthful before</tspan><tspan x="848" dy="32.5">it moves.</tspan></text>
  
      
    <rect x="1185" y="250" width="320" height="300" rx="18" fill="#ffffff" stroke="#d8dee8" filter="url(#shadow)" />
    <rect x="1185" y="250" width="8" height="300" rx="4" fill="#067647" />
    <text x="1213" y="306" font-size="30" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="1213" dy="0">clients trust us</tspan></text>
    <text x="1213" y="397.4" font-size="26" font-weight="700" fill="#5b6472" font-family="Arial, Helvetica, sans-serif"><tspan x="1213" dy="0">Clients do not</tspan><tspan x="1213" dy="32.5">waste time</tspan><tspan x="1213" dy="32.5">checking agency</tspan><tspan x="1213" dy="32.5">copy again.</tspan></text>
  
      <rect x="180" y="640" width="1240" height="92" rx="18" fill="#edf3ff" stroke="#c9d9ff" />
      <text x="230" y="696" font-size="32" font-weight="900" fill="#0d1117" font-family="Arial, Helvetica, sans-serif"><tspan x="230" dy="0">Lookitup answers this pressure with source-bound evidence</tspan><tspan x="230" dy="37.76">before publication.</tspan></text>
    
</svg>